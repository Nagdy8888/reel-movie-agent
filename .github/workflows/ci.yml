# Lint, type-check, and test the Python workspace on every PR and push to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (ruff · pyright · pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Sync workspace (frozen lockfile)
        run: uv sync --frozen --group dev

      - name: Ruff lint
        run: uv run ruff check apps/agents/src apps/backend/src apps/agents/tests apps/backend/tests

      - name: Ruff format check
        run: uv run ruff format --check apps/agents/src apps/backend/src apps/agents/tests apps/backend/tests

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -q
