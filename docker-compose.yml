services:
  neo4j:
    image: neo4j:5.24
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Browser (HTTP)
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: .
      dockerfile: apps/agents/Dockerfile
    env_file: [.env]
    ports:
      - "2024:2024"
    volumes:
      - ./apps/agents:/app/apps/agents   # live-reload source
      - ./.env:/app/.env:ro              # so langgraph.json "../../.env" resolves in-container

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file: [.env]
    environment:
      NEO4J_URI: bolt://neo4j:7687     # talk to the neo4j service, not localhost
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  neo4j_data:
