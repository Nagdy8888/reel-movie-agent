# Lint, type-check, test; on main also build/push the backend image and SSH-deploy to EC2.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Python (ruff · pyright · pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Sync workspace (frozen lockfile)
        run: uv sync --frozen --group dev

      - name: Ruff lint
        run: uv run ruff check apps/agents/src apps/backend/src apps/agents/tests apps/backend/tests

      - name: Ruff format check
        run: uv run ruff format --check apps/agents/src apps/backend/src apps/agents/tests apps/backend/tests

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -q

  deploy-backend:
    name: Build · push · SSH deploy
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR repository names must be lowercase; GitHub owner may not be.
      - name: Lowercase image owner
        id: image
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/reel-backend:latest
            ghcr.io/${{ steps.image.outputs.owner }}/reel-backend:${{ github.sha }}

      - name: SSH deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: bash /opt/reel/deploy.sh
