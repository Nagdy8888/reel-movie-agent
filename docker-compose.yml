services:
  rag-postgres:
    image: shangor/postgres-for-rag:v1.0
    environment:
      POSTGRES_USER: ${RAG_PG_USER}
      POSTGRES_PASSWORD: ${RAG_PG_PASSWORD}
      POSTGRES_DB: ${RAG_PG_DATABASE}
    ports:
      - "5433:5432"
    volumes:
      - rag_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RAG_PG_USER} -d ${RAG_PG_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: .
      dockerfile: apps/agents/Dockerfile
    env_file: [.env]
    environment:
      RAG_PG_HOST: rag-postgres
    ports:
      - "2024:2024"
    volumes:
      - ./apps/agents:/app/apps/agents
      - ./.env:/app/.env:ro
      - lightrag_data:/data/lightrag
    depends_on:
      rag-postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file: [.env]
    environment:
      RAG_PG_HOST: rag-postgres
    ports:
      - "8000:8000"
    volumes:
      - lightrag_data:/data/lightrag
    depends_on:
      rag-postgres:
        condition: service_healthy

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  rag_pg_data:
  lightrag_data:
