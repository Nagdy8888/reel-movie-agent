# Lint, type-check, test; on main also build/push the backend image and SSH-deploy to EC2.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Python (ruff · pyright · pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Sync workspace (frozen lockfile)
        run: uv sync --frozen --group dev

      - name: Ruff lint
        run: uv run ruff check apps/agents/src apps/backend/src apps/agents/tests apps/backend/tests

      - name: Ruff format check
        run: uv run ruff format --check apps/agents/src apps/backend/src apps/agents/tests apps/backend/tests

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -q

  frontend:
    name: Frontend (lint · types · unit · build · e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_URL: https://bkhmqtcxoxtrydumgwfd.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-public-anon-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright UX tests
        run: pnpm test:e2e:ci

  deploy-backend:
    name: Build · push · SSH deploy
    needs: [quality, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR repository names must be lowercase; GitHub owner may not be.
      - name: Lowercase image owner
        id: image
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/reel-backend:latest
            ghcr.io/${{ steps.image.outputs.owner }}/reel-backend:${{ github.sha }}

      - name: Build and push LightRAG Postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/agents/Dockerfile.postgres
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/reel-lightrag-postgres:latest
            ghcr.io/${{ steps.image.outputs.owner }}/reel-lightrag-postgres:${{ github.sha }}

      - name: Sync EC2 compose files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/aws/docker-compose.prod.yml,infra/aws/deploy.sh,infra/aws/Caddyfile"
          target: /opt/reel
          strip_components: 2

      - name: SSH deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN,RAG_PG_USER,RAG_PG_PASSWORD,RAG_PG_DATABASE
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Upsert LightRAG keys into /opt/reel/.env (Compose interpolates them).
            # Set GitHub Actions secrets RAG_PG_USER / RAG_PG_PASSWORD / RAG_PG_DATABASE.
            upsert_env() {
              local key="$1" val="$2" file=/opt/reel/.env
              sudo touch "$file"
              sudo chmod 600 "$file"
              if sudo grep -q "^${key}=" "$file"; then
                sudo sed -i "s|^${key}=.*|${key}=${val}|" "$file"
              else
                echo "${key}=${val}" | sudo tee -a "$file" >/dev/null
              fi
            }
            if [[ -n "${RAG_PG_PASSWORD:-}" ]]; then
              upsert_env RAG_PG_USER "${RAG_PG_USER:-lightrag}"
              upsert_env RAG_PG_PASSWORD "$RAG_PG_PASSWORD"
              upsert_env RAG_PG_DATABASE "${RAG_PG_DATABASE:-lightrag}"
              upsert_env RAG_PG_HOST rag-postgres
              upsert_env RAG_PG_PORT 5432
              upsert_env LIGHTRAG_WORKING_DIR /data/lightrag
            fi

            # Empty-password first boot leaves a broken data dir. Wipe only when
            # the prior rag-postgres container exists and is unhealthy.
            if sudo docker inspect --format '{{.State.Health.Status}}' reel-rag-postgres-1 2>/dev/null | grep -qx unhealthy; then
              echo "rag-postgres unhealthy (likely empty POSTGRES_PASSWORD init) — resetting volume once"
              sudo docker compose -f /opt/reel/docker-compose.prod.yml down || true
              sudo docker volume rm reel_rag_pg_data || true
            fi

            # Empty-password first boot corrupts the data dir — reset once if still empty.
            if ! sudo grep -q '^RAG_PG_PASSWORD=.\+' /opt/reel/.env; then
              echo "ERROR: RAG_PG_PASSWORD missing in /opt/reel/.env and secret RAG_PG_PASSWORD unset." >&2
              exit 1
            fi

            chmod +x /opt/reel/deploy.sh
            sudo bash /opt/reel/deploy.sh
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RAG_PG_USER: ${{ secrets.RAG_PG_USER }}
          RAG_PG_PASSWORD: ${{ secrets.RAG_PG_PASSWORD }}
          RAG_PG_DATABASE: ${{ secrets.RAG_PG_DATABASE }}
