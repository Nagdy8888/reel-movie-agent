services:
  neo4j:
    image: neo4j:5.24
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Browser (HTTP)
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: .
      dockerfile: apps/agents/Dockerfile
    env_file: [.env]
    ports:
      - "2024:2024"
    volumes:
      - ./apps/agents:/app/apps/agents   # live-reload source
      - ./.env:/app/.env:ro              # so langgraph.json "../../.env" resolves in-container

volumes:
  neo4j_data:
