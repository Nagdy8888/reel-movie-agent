# Production stack for EC2: backend + LightRAG AGE Postgres + Caddy TLS.
# Supabase (auth, chat, checkpoints, UI projection) stays off-box.
#
# Compose interpolates ${RAG_PG_*} from /opt/reel/.env (must exist next to this file).
services:
  rag-postgres:
    image: ghcr.io/nagdy8888/reel-lightrag-postgres:latest
    env_file: [/opt/reel/.env]
    environment:
      POSTGRES_USER: ${RAG_PG_USER:-lightrag}
      # Fail fast if password missing — empty POSTGRES_PASSWORD leaves Postgres unhealthy.
      POSTGRES_PASSWORD: ${RAG_PG_PASSWORD:?Set RAG_PG_PASSWORD in /opt/reel/.env}
      POSTGRES_DB: ${RAG_PG_DATABASE:-lightrag}
    volumes:
      - rag_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  backend:
    image: ghcr.io/nagdy8888/reel-backend:latest
    env_file: [/opt/reel/.env]
    environment:
      APP_ENV: prod
      RAG_PG_HOST: rag-postgres
      RAG_PG_PORT: "5432"
      LIGHTRAG_WORKING_DIR: /data/lightrag
    volumes:
      - lightrag_data:/data/lightrag
    depends_on:
      rag-postgres:
        condition: service_healthy
    restart: unless-stopped
    expose: ["8000"]

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [backend]

volumes:
  rag_pg_data:
  lightrag_data:
  caddy_data:
  caddy_config:
